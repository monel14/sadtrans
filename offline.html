<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SadTrans - Hors ligne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center p-8 max-w-md">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <i class="fas fa-wifi text-6xl text-gray-400 mb-4"></i>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Vous êtes hors ligne</h1>
            <p class="text-gray-600 mb-6">Vérifiez votre connexion Internet et rechargez la page.</p>
            <button onclick="location.reload()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
                Réessayer
            </button>
        </div>
    </div>
</body>
</html>
